name: Benchmark TPU Nightly

on:
  push:  # TODO: remove before merging — temporary trigger for CI testing
    branches:
      - yifeixu/tpu-nightly-benchmark
  schedule:
    - cron: '0 10 * * *'  # Runs at 2 AM PST (10 AM UTC)
  workflow_dispatch:
    inputs:
      kernels:
        description: 'Comma-separated list of kernels to benchmark'
        required: false
        type: string
        # Excluded kernels:
        #   layer_norm: OOB slice when reduction_loops doesn't evenly divide the reduction dim (gh#1937)
        #   grpo_loss: autotuning finds no working config on CI (all configs fail)
        #   jagged_hstu_attn: default config fails while computing baseline on CI
        #   softmax: default config block_sizes=[8] fails on CI TPU (works on dev pod); softmax_two_pass covers this
        default: "exp,add,softmax_two_pass,welford,attention,bmm,broadcast_matmul,geglu,low_mem_dropout,swiglu,batch_softmax,sum,rms_norm"

permissions:
  contents: read

jobs:
  benchmark-tpu:
    uses: ./.github/workflows/benchmark_tpu.yml
    permissions:
      contents: read
    with:
      kernels: ${{ github.event.inputs.kernels || 'exp,add,softmax_two_pass,welford,attention,bmm,broadcast_matmul,geglu,low_mem_dropout,swiglu,batch_softmax,sum,rms_norm' }}
