name: Benchmark Dispatch

on:
  workflow_dispatch:
    inputs:
      run_h100:
        description: 'Run benchmark on H100'
        required: false
        type: boolean
        default: false
      run_b200:
        description: 'Run benchmark on B200'
        required: false
        type: boolean
        default: true
      run_mi350x:
        description: 'Run benchmark on MI350X'
        required: false
        type: boolean
        default: false
      run_tpu:
        description: 'Run benchmark on TPU v7'
        required: false
        type: boolean
        default: false
      kernels:
        description: 'Comma-separated list of kernels to benchmark on GPU runners'
        required: false
        type: string
        default: "softmax,jsd,welford,kl_div,int4_gemm,layer_norm,layer_norm-bwd,rms_norm,rms_norm-bwd,cross_entropy,flash_attention,gemm,grouped_gemm"
      kernels_tpu:
        description: 'Comma-separated list of kernels to benchmark on TPU (examples-based; disjoint from `kernels`). Default is the dashboard-tracked subset; pass an explicit list for ad-hoc full-coverage runs.'
        required: false
        type: string
        default: "flash_attention,bmm,gemm,welford,softmax,layer_norm,rms_norm,rms_norm-bwd,cross_entropy"
      env_vars:
        description: 'Environment variables for benchmark runner'
        required: false
        type: string
        default: ""
      custom_args:
        description: 'Custom arguments to append to benchmark commands'
        required: false
        type: string
        default: ""

jobs:
  gen-matrix-h100:
    if: ${{ github.event.inputs.run_h100 == 'true' }}
    uses: ./.github/workflows/compute-benchmark-matrix.yml
    with:
      max-runners: 13
      kernels: ${{ github.event.inputs.kernels }}

  run-h100:
    needs: gen-matrix-h100
    uses: ./.github/workflows/benchmark.yml
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.gen-matrix-h100.outputs.matrix) }}
    permissions:
      id-token: write
      contents: read
    with:
      runner: linux.aws.h100
      python-version: "3.12"
      image: nvidia/cuda:12.8.1-devel-ubuntu24.04
      runtime-version: cu128
      container-options: --gpus all
      alias: h100
      kernels: ${{ matrix.kernels }}
      env-vars: ${{ github.event.inputs.env_vars }}
      custom-args: ${{ github.event.inputs.custom_args }}

  gen-matrix-b200:
    uses: ./.github/workflows/compute-benchmark-matrix.yml
    if: ${{ github.event.inputs.run_b200 == 'true' }}
    with:
      max-runners: 13
      kernels: ${{ github.event.inputs.kernels }}

  run-b200:
    needs: gen-matrix-b200
    uses: ./.github/workflows/benchmark.yml
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.gen-matrix-b200.outputs.matrix) }}
    permissions:
      id-token: write
      contents: read
    with:
      runner: linux.dgx.b200
      python-version: "3.12"
      image: nvidia/cuda:13.1.0-devel-ubuntu24.04
      runtime-version: cu130
      container-options: --gpus all
      alias: b200
      kernels: ${{ matrix.kernels }}
      env-vars: ${{ github.event.inputs.env_vars }}
      custom-args: ${{ github.event.inputs.custom_args }}

  gen-matrix-mi350x:
    uses: ./.github/workflows/compute-benchmark-matrix.yml
    if: ${{ github.event.inputs.run_mi350x == 'true' }}
    with:
      max-runners: 13
      kernels: ${{ github.event.inputs.kernels }}

  run-mi350x:
    needs: gen-matrix-mi350x
    uses: ./.github/workflows/benchmark.yml
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.gen-matrix-mi350x.outputs.matrix) }}
    permissions:
      id-token: write
      contents: read
    with:
      runner: linux.rocm.gpu.ecosystem.gfx950.1
      python-version: "3.12"
      image: rocm/dev-ubuntu-24.04:7.1.1-complete
      runtime-version: rocm7.1
      container-options: --device=/dev/kfd --device=/dev/dri
      alias: mi350x
      kernels: ${{ matrix.kernels }}
      env-vars: ${{ github.event.inputs.env_vars }}
      custom-args: ${{ github.event.inputs.custom_args }}

  run-tpu:
    if: ${{ github.event.inputs.run_tpu == 'true' }}
    uses: ./.github/workflows/benchmark_tpu.yml
    permissions:
      contents: read
    with:
      alias: tpu
      kernels: ${{ github.event.inputs.kernels_tpu }}

  trigger-docs-deploy:
    if: always()
    needs: [run-b200, run-h100, run-mi350x, run-tpu]
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Trigger docs deploy
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docs-deploy.yml',
              ref: 'main'
            })
